version: 2.1

jobs:
  build:
    working_directory: ~/SimpleApplication
    docker:
      - image: cimg/node:18.19

    steps:
      - checkout

      - restore_cache:
          keys:
            - dependency-cache-{{ checksum "package-lock.json" }}

      - run:
          name: install dependencies
          command: npm install

      - save_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
          paths:
            - ./node_modules

workflows:
  version: 2
  build_workflow:
    jobs:
      - build