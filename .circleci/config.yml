version: 2.1

jobs:
  build:
    working_directory: ~/SimpleApplication
    docker:
      - image: cimg/node:18.19
    steps:
      - checkout
      - run:
          name: update-npm
          command: 'sudo npm install -g npm@latest'
      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
      - run:
          name: install-npm
          command: npm install
      - run:
          name: test-run
          command: npm run test
      - save_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
          paths:
            - ./node_modules

workflows:
  version: 2
  build:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main