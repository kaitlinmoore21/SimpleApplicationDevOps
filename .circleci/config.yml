version: 2.1

workflow:
    version: 2
    build:
    jobs:
      -build:
        filters:
        branches:
          only:
              -main

        jobs:
          build:
            working_directory: ~/SimpleApplication
            docker:
                -   image: circleci/openjdk:11.0.11
steps:
  -checkout
-run:
name: update-npm
command: 'sudo npm install -g npm@5'
-restore_cache:
      key: dependency-cache-{{ checksum "package-lock.json" }
      run:
        name: install dependencies
        command: npm install
-save_cache:
key: dependency-cache-{{ checksum "package-lock.json" }}
paths:
- ./node_modules